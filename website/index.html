<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProseKit YouTube Extension</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <p class="eyebrow">prosekit-extension-youtube</p>
        <h1 class="title">ProseKit YouTube Extension</h1>
        <p class="subtitle">
          A tiny ProseKit extension that turns YouTube embed links into inline
          video players. The document below is fully editable, so try it out.
        </p>
      </header>

      <main class="card">
        <div class="toolbar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="label">editor</span>
        </div>
        <div id="editor"></div>
      </main>

      <footer class="footer">
        <a href="https://prosekit.dev" target="_blank" rel="noreferrer"
          >ProseKit</a
        >
        <span class="sep">·</span>
        <a
          href="https://www.npmjs.com/package/prosekit-extension-youtube"
          target="_blank"
          rel="noreferrer"
          >npm</a
        >
        <span class="sep">·</span>
        <a
          href="https://github.com/prosekit/prosekit-extension-template"
          target="_blank"
          rel="noreferrer"
          >GitHub</a
        >
      </footer>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
